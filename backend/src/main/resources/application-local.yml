spring:
  datasource:
    url: jdbc:h2:mem:financedb
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-only-do-not-use-in-production-min-32chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  settings:
    encryption-key: ${SETTINGS_ENCRYPTION_KEY:local-dev-settings-encryption-key-min-32chars!!}
  openai:
    model: ${OPENAI_MODEL:gpt-4o-mini}
    api-key: ${OPENAI_API_KEY:}
  seed:
    demo-enabled: true
    consolidate-legacy-users: true
  ai:
    platform-enabled: ${APP_PLATFORM_AI_ENABLED:true}
    platform-min-account-age-hours: ${APP_PLATFORM_AI_MIN_ACCOUNT_AGE_HOURS:0}
    platform-category-quota-per-window: ${APP_AI_PLATFORM_CATEGORY_QUOTA:120}
    platform-receipt-quota-per-window: ${APP_AI_PLATFORM_RECEIPT_QUOTA:30}
    user-monthly-brief-quota-per-window: ${APP_AI_USER_MONTHLY_BRIEF_QUOTA:24}
    platform-monthly-brief-quota-per-window: ${APP_AI_PLATFORM_MONTHLY_BRIEF_QUOTA:12}
  auth:
    max-new-accounts-per-ip-per-day: ${APP_MAX_NEW_ACCOUNTS_PER_IP_PER_DAY:20}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
