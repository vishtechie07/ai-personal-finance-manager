spring:
  datasource:
    url: jdbc:h2:mem:financedb
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-only-do-not-use-in-production-min-32chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  settings:
    encryption-key: ${SETTINGS_ENCRYPTION_KEY:local-dev-settings-encryption-key-min-32chars!!}
  openai:
    model: ${OPENAI_MODEL:gpt-4o-mini}
