app:
  jwt:
    secret: ${JWT_SECRET:local-dev-only-do-not-use-in-production-min-32chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  settings:
    encryption-key: ${SETTINGS_ENCRYPTION_KEY:local-dev-settings-encryption-key-min-32chars!!}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  seed:
    demo-enabled: ${APP_SEED_DEMO_ENABLED:false}
    consolidate-legacy-users: ${APP_SEED_CONSOLIDATE_LEGACY_USERS:false}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  auth:
    registration-enabled: ${APP_REGISTRATION_ENABLED:true}
    rate-limit-per-window: ${APP_RATE_LIMIT_PER_WINDOW:30}
    rate-limit-window-seconds: ${APP_RATE_LIMIT_WINDOW_SECONDS:60}
    register-attempts-per-window: ${APP_REGISTER_ATTEMPTS_PER_WINDOW:5}
    register-attempt-window-seconds: ${APP_REGISTER_ATTEMPT_WINDOW_SECONDS:3600}
    max-new-accounts-per-ip-per-day: ${APP_MAX_NEW_ACCOUNTS_PER_IP_PER_DAY:5}
  ai:
    platform-enabled: ${APP_PLATFORM_AI_ENABLED:false}
    platform-min-account-age-hours: ${APP_PLATFORM_AI_MIN_ACCOUNT_AGE_HOURS:24}
    platform-trial-minutes: ${APP_PLATFORM_AI_TRIAL_MINUTES:0}
    block-demo-user-platform-ai: true
    max-description-length: ${APP_AI_MAX_DESCRIPTION_LENGTH:200}
    quota-window-seconds: ${APP_AI_QUOTA_WINDOW_SECONDS:3600}
    user-category-quota-per-window: ${APP_AI_USER_CATEGORY_QUOTA:60}
    user-receipt-quota-per-window: ${APP_AI_USER_RECEIPT_QUOTA:15}
    platform-category-quota-per-window: ${APP_AI_PLATFORM_CATEGORY_QUOTA:25}
    platform-receipt-quota-per-window: ${APP_AI_PLATFORM_RECEIPT_QUOTA:5}
    user-monthly-brief-quota-per-window: ${APP_AI_USER_MONTHLY_BRIEF_QUOTA:12}
    platform-monthly-brief-quota-per-window: ${APP_AI_PLATFORM_MONTHLY_BRIEF_QUOTA:6}
  storage:
    path: ${APP_STORAGE_PATH:/app/uploads}
    max-file-size: ${APP_STORAGE_MAX_FILE_SIZE:5242880}
  email:
    enabled: ${APP_EMAIL_ENABLED:false}
    resend-api-key: ${RESEND_API_KEY:}
    from-address: ${APP_EMAIL_FROM:SpendSense <noreply@spendsense.app>}
    max-reminders-per-user-per-day: ${APP_EMAIL_MAX_REMINDERS_PER_DAY:3}
    reminder-cron: ${APP_EMAIL_REMINDER_CRON:0 0 9 * * *}
  openai:
    model: ${OPENAI_MODEL:gpt-4o-mini}
    api-key: ${OPENAI_API_KEY:}

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  application:
    name: spendsense

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  profiles:
    default: local

server:
  port: 8080
  servlet:
    context-path: /api
logging:
  level:
    com.finance.manager: INFO
    org.springframework: WARN
    org.hibernate: WARN
