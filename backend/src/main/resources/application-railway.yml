spring:
  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL}}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER}}}
    password: ${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD}}}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  settings:
    encryption-key: ${SETTINGS_ENCRYPTION_KEY:${JWT_SECRET}}
  openai:
    model: ${OPENAI_MODEL:gpt-4o-mini}
    api-key: ${OPENAI_API_KEY:}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.up.railway.app}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  auth:
    registration-enabled: ${APP_REGISTRATION_ENABLED:true}
    max-new-accounts-per-ip-per-day: ${APP_MAX_NEW_ACCOUNTS_PER_IP_PER_DAY:5}
  ai:
    platform-enabled: ${APP_PLATFORM_AI_ENABLED:false}
    platform-min-account-age-hours: ${APP_PLATFORM_AI_MIN_ACCOUNT_AGE_HOURS:24}
  seed:
    demo-enabled: ${APP_SEED_DEMO_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
