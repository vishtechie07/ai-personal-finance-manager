spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT:5432}/${DATABASE_NAME}}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  settings:
    encryption-key: ${SETTINGS_ENCRYPTION_KEY:${JWT_SECRET}}
  openai:
    model: ${OPENAI_MODEL:gpt-4o-mini}
    api-key: ${OPENAI_API_KEY:}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.onrender.com}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  auth:
    registration-enabled: ${APP_REGISTRATION_ENABLED:true}
  seed:
    demo-enabled: ${APP_SEED_DEMO_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
