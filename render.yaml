# Optional Render Blueprint (Dashboard → New → Blueprint).
# You can also create Postgres + Web Service manually; see docs/RENDER_DEPLOY.md.

databases:
  - name: pfm-db
    plan: free
    databaseName: finance
    user: pfm

services:
  - type: web
    name: spendsense
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_HOST
        fromDatabase:
          name: pfm-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: pfm-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: pfm-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: pfm-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: pfm-db
          property: password
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://*.onrender.com
      - key: OPENAI_API_KEY
        sync: false
